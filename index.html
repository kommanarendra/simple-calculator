<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .calculator {
      background: white;
      padding: 25px;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
      text-align: center;
    }

    input, select, button {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .clear-btn {
      background-color: #dc3545;
    }

    .clear-btn:hover {
      background-color: #a71d2a;
    }

    #result {
      margin-top: 15px;
      font-size: 22px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

  <div class="calculator">
    <h2>Simple Calculator</h2>

    <input type="number" id="num1" placeholder="Enter first number">

    <input type="number" id="num2" placeholder="Enter second number">

    <select id="operator">
      <option value="add">Add +</option>
      <option value="subtract">Subtract -</option>
      <option value="multiply">Multiply ×</option>
      <option value="divide">Divide ÷</option>
    </select>

    <button onclick="calculate()">Calculate</button>
    <button onclick="clearCalculator()" class="clear-btn">Clear</button>

    <div id="result">Result: </div>
  </div>

  <script>
    function calculate() {
      let input1 = document.getElementById("num1").value;
      let input2 = document.getElementById("num2").value;
      let operator = document.getElementById("operator").value;
      let result;

      // Validate input fields before calculation
      if (input1 === "" || input2 === "") {
        document.getElementById("result").innerText = "Please enter both numbers";
        document.getElementById("result").style.color = "red";
        return;
      }

      let number1 = Number(input1);
      let number2 = Number(input2);

      document.getElementById("result").style.color = "green";

      if (operator === "add") {
        result = number1 + number2;
      } 
      else if (operator === "subtract") {
        result = number1 - number2;
      } 
      else if (operator === "multiply") {
        result = number1 * number2;
      } 
      else if (operator === "divide") {
        if (number2 === 0) {
          document.getElementById("result").innerText = "Cannot divide by zero";
          document.getElementById("result").style.color = "red";
          return;
        } else {
          result = number1 / number2;
        }
      }

      document.getElementById("result").innerText = "Result: " + result;
    }

    function clearCalculator() {
      document.getElementById("num1").value = "";
      document.getElementById("num2").value = "";
      document.getElementById("operator").value = "add";
      document.getElementById("result").innerText = "Result: ";
      document.getElementById("result").style.color = "green";
    }
  </script>

</body>
</html>
